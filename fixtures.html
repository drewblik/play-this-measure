<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f3ece0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Music&display=swap" rel="stylesheet" />
  <title>PTM — Engine Fixtures (M0)</title>
  <style>
    .fx-wrap { max-width: 760px; margin: 0 auto; }
    h1 .em { font-style: italic; font-weight: 500; color: var(--attack); }
    .fx-controls { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: center; margin: 16px 0; }
    .fx-seg { display: flex; flex-wrap: wrap; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 10px; padding: 4px; gap: 4px; }
    .fx-seg button { font-family: "Newsreader", serif; font-size: 15px; color: var(--ink-soft); background: transparent; border: 0; padding: 8px 13px; border-radius: 7px; cursor: pointer; transition: all .15s ease; white-space: nowrap; }
    .fx-seg button:hover { color: var(--ink); }
    .fx-seg button.on { background: var(--ink); color: var(--paper); box-shadow: 0 4px 12px -6px rgba(0, 0, 0, .5); }
    #fxSel { margin-top: 8px; }
    .play { font-family: "Fraunces", serif; font-weight: 600; font-size: 16px; background: var(--attack); color: #fff; border: 0; border-radius: 11px; padding: 12px 22px; cursor: pointer; box-shadow: 0 10px 22px -12px rgba(187, 62, 3, .9); }
    .play:active { transform: translateY(1px); }
    .fx-tempo { display: flex; align-items: center; gap: 8px; font-family: "Fraunces", serif; font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .12em; }
    .fx-tempo b { font-size: 18px; color: var(--ink); }
    .fx-tempo input { accent-color: var(--attack); cursor: pointer; }
    .card { background: linear-gradient(180deg, #fbf6ec, #f1e8d8); border: 1px solid var(--rule); border-radius: 14px; box-shadow: 0 1px 0 rgba(255, 255, 255, .7) inset, 0 18px 40px -28px rgba(40, 30, 10, .6); padding: clamp(16px, 3vw, 28px); margin-top: 8px; }
  </style>
</head>
<body>
  <main id="app"></main>
  <script type="module" src="/src/fixtures-main.js"></script>
</body>
</html>
